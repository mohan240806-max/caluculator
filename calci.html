<!DOCTYPE html>
<html>
<head>
    <title>Scientific Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="calculator">
        <input type="text" id="result" value="0">
        
        <br>
        <button class="sci" onclick="display('sin(')">sin</button>
        <button class="sci" onclick="display('cos(')">cos</button>
        <button class="sci" onclick="display('tan(')">tan</button>
        <button class="sci" onclick="display('log(')">log</button>
        <br>
        
        <button onclick="display('(')">(</button>
        <button onclick="display(')')">)</button>
        <button class="sci" onclick="display('Math.PI*')">π</button>
        <button class="sci" onclick="display('Math.sqrt(')">√</button>
        <br>
        
        <button onclick="display('7')">7</button>
        <button onclick="display('8')">8</button>
        <button onclick="display('9')">9</button>
        <button onclick="display('/')">/</button>
        <br>
        
        <button onclick="display('4')">4</button>
        <button onclick="display('5')">5</button>
        <button onclick="display('6')">6</button>
        <button onclick="display('*')">×</button>
        <br>
        
        <button onclick="display('1')">1</button>
        <button onclick="display('2')">2</button>
        <button onclick="display('3')">3</button>
        <button onclick="display('-')">-</button>
        <br>
        
        <button onclick="display('0')">0</button>
        <button onclick="display('.')">.</button>
        <button onclick="calculate()">=</button>
        <button onclick="display('+')">+</button>
        <br>
        
        <button onclick="clearScreen()" class="clear">C</button>
    </div>
    <script src="script.js"></script>
</body>
</html>
